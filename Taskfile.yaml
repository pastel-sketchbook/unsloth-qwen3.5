version: 3

tasks:
  run:python:
    desc: Run the Python screen capture script
    dir: screen_describer_python
    cmds:
      - uv run qwen35_screen_capture.py

  run:rust:
    desc: Run the Rust screen describer
    cmds:
      - cargo run --manifest-path screen_describer/Cargo.toml

  run:zig:
    desc: Run the Zig screen describer
    dir: screen_describer_zig
    cmds:
      - zig build run

  build:zig:
    desc: Build the Zig screen describer
    dir: screen_describer_zig
    cmds:
      - zig build

  fmt:zig:
    desc: Format Zig code
    dir: screen_describer_zig
    cmds:
      - zig fmt src/main.zig

  fmt:rust:
    desc: Format Rust code
    cmds:
      - cargo fmt --manifest-path screen_describer/Cargo.toml

  fmt:python:
    desc: Format Python code
    dir: screen_describer_python
    cmds:
      - ruff format .

  fmt:
    desc: Format all code
    deps:
      - fmt:rust
      - fmt:python
      - fmt:zig

  lint:rust:
    desc: Lint Rust code
    cmds:
      - cargo clippy --manifest-path screen_describer/Cargo.toml

  lint:python:
    desc: Lint Python code
    dir: screen_describer_python
    cmds:
      - ruff check .

  lint:
    desc: Lint all code
    deps:
      - lint:rust
      - lint:python

  loc:
    desc: Count lines of code with tokei
    cmds:
      - tokei .

  check:
    desc: Run all checks (format, lint, loc)
    deps:
      - fmt
      - lint
      - loc
